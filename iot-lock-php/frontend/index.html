<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraLock - IoT Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>
    <div className="layout">
        <!-- Sidebar -->
        <aside className="sidebar">
            <div className="logo">
                <i className="ri-shield-keyhole-line"></i>
                <span>Aura<span>Lock</span></span>
            </div>
            <nav>
                <a href="#" className="active"><i className="ri-dashboard-line"></i> Dashboard</a>
                <a href="#"><i className="ri-cpu-line"></i> Devices</a>
                <a href="#"><i className="ri-history-line"></i> Logs</a>
                <a href="#"><i className="ri-settings-3-line"></i> Settings</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main className="content">
            <header>
                <div className="welcome">
                    <h1>Command Center</h1>
                    <p>IoT Device Management</p>
                </div>
                <div className="actions">
                    <button id="addDeviceBtn" className="btn-primary">
                        <i className="ri-add-line"></i> Add Hardware Device
                    </button>
                </div>
            </header>

            <!-- Stats Bar -->
            <div className="stats-grid">
                <div className="stat-card">
                    <div className="icon blue"><i className="ri-router-line"></i></div>
                    <div className="info">
                        <span className="label">Total Devices</span>
                        <h3 id="totalDevices">0</h3>
                    </div>
                </div>
                <div className="stat-card">
                    <div className="icon green"><i className="ri-wifi-line"></i></div>
                    <div className="info">
                        <span className="label">Online Now</span>
                        <h3 id="onlineDevices">0</h3>
                    </div>
                </div>
            </div>

            <!-- Device List Section -->
            <section className="device-section">
                <div className="section-header">
                    <h2>Connected Hardwares</h2>
                    <span className="badge">Live Telemetry</span>
                </div>
                <div className="device-grid" id="deviceGrid">
                    <!-- Devices will be injected here -->
                    <div className="loading">Fetching device state...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Add Device Modal -->
    <div id="addModal" className="modal">
        <div className="modal-content">
            <div className="modal-header">
                <h2>Register New Hardware</h2>
                <i className="ri-close-line close"></i>
            </div>
            <div className="modal-body">
                <div className="form-group">
                    <label>Generated Device ID</label>
                    <div className="id-preview">
                        <code id="newDeviceId">PENDING...</code>
                        <button id="refreshId"><i className="ri-refresh-line"></i></button>
                    </div>
                </div>
                <div className="form-group">
                    <label>Friendly Name</label>
                    <input type="text" id="deviceName" placeholder="e.g. Main Gate S3">
                </div>
                <div className="form-grid">
                    <div className="form-group">
                        <label>ESP32 IP Address</label>
                        <input type="text" id="deviceIp" placeholder="192.168.1.100">
                    </div>
                    <div className="form-group">
                        <label>Port</label>
                        <input type="number" id="devicePort" value="80">
                    </div>
                </div>
                <div className="modal-actions">
                    <button id="testConnection" className="btn-secondary">
                        <i className="ri-wireless-charging-line"></i> Test Connection
                    </button>
                    <button id="saveDevice" className="btn-save">Register Device</button>
                </div>
                <p className="note" id="connectionStatus"></p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
